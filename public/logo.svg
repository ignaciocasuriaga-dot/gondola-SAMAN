<svg width="320" height="200" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SAMAN">
  <defs>
    <radialGradient id="samanRed" cx="42%" cy="28%" r="85%">
      <stop offset="0%" stop-color="#fa5048"/>
      <stop offset="50%" stop-color="#e2141b"/>
      <stop offset="100%" stop-color="#ad040d"/>
    </radialGradient>
    <linearGradient id="samanGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="samanShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#samanShadow)">
    <!-- Anillo blanco completo -->
    <ellipse cx="160" cy="100" rx="150" ry="84" fill="#ffffff"/>
    <!-- Cuerpo rojo -->
    <ellipse cx="160" cy="100" rx="134" ry="72" fill="url(#samanRed)"/>
    <!-- Brillo superior tipo vidrio -->
    <ellipse cx="160" cy="78" rx="118" ry="48" fill="url(#samanGloss)"/>
  </g>

  <!-- Texto SAMAN: sombra roja oscura, letras blancas gruesas y redondeadas -->
  <g font-family="'Arial Rounded MT Bold','Helvetica Rounded',Arial,sans-serif" font-weight="900" font-size="58" letter-spacing="0.5" text-anchor="middle">
    <text x="164" y="125" fill="#8c0008" opacity="0.45">SAMAN</text>
    <text x="160" y="121" fill="#ffffff">SAMAN</text>
  </g>
</svg>
