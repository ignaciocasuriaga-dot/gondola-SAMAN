name: Scrape Gondola SAMAN Prices

on:
  workflow_dispatch: {}
  schedule:
    # 08:00 and 18:00 Uruguay time (UTC-3).
    - cron: '0 11,21 * * *'

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Scrape
        run: node src/main.js

      - name: Telegram notify if configured
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_THRESHOLD_PCT: ${{ vars.ALERT_THRESHOLD_PCT || '5' }}
        run: node src/notify.js
        continue-on-error: true

      - name: Commit and push public data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: actualizar precios gondola saman $(date -u +%Y-%m-%dT%H:%M)Z"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push failed (attempt $i), waiting 5s..."
            sleep 5
          done
          exit 1
